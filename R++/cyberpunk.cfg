# Cyberpunk Terminal Configuration File
# ═══════════════════════════════════════════════════════

# Основной цвет интерфейса (cyan, magenta, green, red, yellow, blue, random)
primary_color=random

# Вторичный цвет для акцентов (cyan, magenta, green, red, yellow, blue, random)
secondary_color=magenta

# Частота обновления экрана (кадры в секунду, 1-60)
update_rate=10

# Включить анимацию потока данных
enable_animation=true

# Включить мигание элементов
enable_blink=true

# Стиль логотипа (simple, ascii_art, matrix, neon)
logo_style=neon

# ═══════════════════════════════════════════════════════
# РАЗДЕЛ КОМАНД - выполняются при запуске
# ═══════════════════════════════════════════════════════

# Команда 1
command_1=lua -e 'print(65536 * 65536 * 65536 * 65536)'

# Команда 2
command_2=echo 'https://www.youtube.com/playlist?list=PLfz6ePV8vuIrWPq7DqY_SOCY1WC34TC_G' | base64

# Команда 3
command_3=lua -e "print(string.format('\27[31m%f\27[0m', math.tan(math.pi / 3) ^ 2))"
